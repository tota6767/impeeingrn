<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>impeeingrn</title>

<style>
body{
font-family:Arial;
background:#0b0f14;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
font-size:40px;
}

.container{
max-width:800px;
margin:auto;
}

.timer{
font-size:60px;
margin:20px;
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.start{background:#2ecc71;color:white;}
.stop{background:#e74c3c;color:white;}
.save{background:#3498db;color:white;}
.delete{background:#ff4d4d;color:white;}

.card{
background:#121823;
padding:15px;
border-radius:12px;
margin:10px 0;
text-align:left;
}

.small{
font-size:12px;
opacity:0.7;
}

.leader{
background:#101826;
padding:10px;
border-radius:10px;
margin:5px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h1>🚽 impeeingrn</h1>
<p class="small">made by tota</p>

<div class="timer" id="timer">00:00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>

<br><br>

<input id="peeName" placeholder="Name your pee"><br><br>

<select id="washed">
<option value="Yes">Washed hands</option>
<option value="No">Did not wash</option>
</select>

<select id="wiped">
<option value="Yes">Wiped</option>
<option value="No">Did not wipe</option>
</select>

<input id="wipes" type="number" placeholder="wipe count" value="0">

<br><br>

<button class="save" onclick="createPee()">Save Pee</button>

<hr>

<h2>🏆 Global Leaderboard</h2>
<div id="leaderboard"></div>

<hr>

<h2>🌎 Recent Pees</h2>
<div id="history"></div>

</div>

<script>

const SUPABASE_URL = "https://bhaznhxhrevrdseeuuyc.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY";

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let seconds=0;
let interval=null;

const timer=document.getElementById("timer");

function startTimer(){
if(interval) return;

interval=setInterval(()=>{
seconds++;
renderTimer();
},1000);
}

function stopTimer(){
clearInterval(interval);
interval=null;
}

function renderTimer(){
let m=Math.floor(seconds/60);
let s=seconds%60;

timer.textContent=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");
}

function resetTimer(){
seconds=0;
renderTimer();
}

const OWNER_KEY="impeeingrn_owner";

function getOwnerToken(){
let token=localStorage.getItem(OWNER_KEY);

if(!token){
token=crypto.randomUUID();
localStorage.setItem(OWNER_KEY,token);
}

return token;
}

async function createPee(){

const name=document.getElementById("peeName").value||"Unnamed Pee";
const washed=document.getElementById("washed").value;
const wiped=document.getElementById("wiped").value;
const wipes=document.getElementById("wipes").value||0;

const duration=seconds;

if(duration<=0){
alert("start the timer first");
return;
}

await supabase.from("pees").insert([{

name:name,
duration_seconds:duration,
washed:washed,
wiped:wiped,
wipes:wipes,
pee_type:"Normal",
notes:null,
peak_seconds:null,
owner_token:getOwnerToken()

}]);

resetTimer();
loadData();

}

async function deletePee(id){

await supabase
.from("pees")
.delete()
.eq("id",id);

loadData();

}

async function loadLeaderboard(){

const {data}=await supabase
.from("pees")
.select("*")
.order("duration_seconds",{ascending:false})
.limit(10);

const board=document.getElementById("leaderboard");

board.innerHTML="";

data.forEach((p,i)=>{

const div=document.createElement("div");
div.className="leader";

div.innerHTML=
"#"+(i+1)+" — "+p.name+
" ("+p.duration_seconds+"s)";

board.appendChild(div);

});

}

async function loadHistory(){

const {data}=await supabase
.from("pees")
.select("*")
.order("created_at",{ascending:false})
.limit(30);

const history=document.getElementById("history");

history.innerHTML="";

const myToken=getOwnerToken();

data.forEach(p=>{

const div=document.createElement("div");
div.className="card";

let deleteBtn="";

if(p.owner_token===myToken){

deleteBtn=
`<button class="delete" onclick="deletePee('${p.id}')">Delete</button>`;

}

div.innerHTML=

`<strong>${p.name}</strong>
<div class="small">
${p.duration_seconds}s • ${p.washed} • wipes:${p.wipes}
</div>
${deleteBtn}`;

history.appendChild(div);

});

}

async function loadData(){

loadLeaderboard();
loadHistory();

}

loadData();

</script>

</body>
</html>
